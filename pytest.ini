[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Tests rapidos de verificacion basica
    regression: Tests completos de regresion
    auth: Tests de autenticacion
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
